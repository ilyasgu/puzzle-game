<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Puzzle Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="game-board">
            <div class="main-puzzle">
                <div class="puzzle-grid" id="puzzleGrid">
                    <!-- Grid tiles will be generated by JavaScript -->
                </div>
            </div>

            <div class="bottom-section">
                <div class="target-label">Target Pattern:</div>
                
                <div class="target-grid" id="targetGrid">
                    <!-- Target pattern will be generated by JavaScript -->
                </div>

                <div class="reset-button" id="resetButton">
                    <svg viewBox="0 0 24 24" width="40" height="40">
                        <path fill="currentColor" d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/>
                    </svg>
                </div>
            </div>

            <div class="status-bar">
                <div class="moves">Moves: <span id="moveCount">0</span></div>
                <div class="solved">Solved: <span id="solvedCount">0</span></div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
